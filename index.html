<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LinarChat</title>

    <!-- PWA для иконки на домашний экран -->
    <link rel="apple-touch-icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23075e54'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white' font-weight='bold'%3EL%3C/text%3E%3C/svg%3E">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23075e54'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white' font-weight='bold'%3EL%3C/text%3E%3C/svg%3E">
    <meta name="theme-color" content="#075e54">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LinarChat">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            height: 100vh;
            background: #f0f2f5;
            position: relative;
        }

        .screen {
            display: none;
            height: 100%;
        }

        .screen.active {
            display: flex;
        }

        .login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .login-card h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .login-card p {
            color: #666;
            margin-bottom: 20px;
        }

        .login-card input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            margin: 20px 0;
            outline: none;
        }

        .login-card input:focus {
            border-color: #667eea;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .chat-container {
            display: flex;
            height: 100%;
        }

        .sidebar {
            width: 300px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: #075e54;
            color: white;
        }

        .user-info {
            margin-bottom: 10px;
        }

        .user-name-display {
            font-weight: bold;
            font-size: 18px;
        }

        .user-id {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 5px;
            word-break: break-all;
        }

        .logout-btn,
        .copy-btn,
        .notify-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-size: 14px;
        }

        .notify-btn {
            background: rgba(37, 211, 102, 0.8);
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
        }

        .user-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .user-item:active {
            background: #e8f0fe;
        }

        .user-name {
            font-weight: 600;
        }

        .user-status {
            font-size: 12px;
        }

        .user-status.online {
            color: #25D366;
        }

        .user-status.offline {
            color: #999;
        }

        .unread-badge {
            background: #ff4444;
            color: white;
            border-radius: 50%;
            min-width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            padding: 0 5px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #e5ddd5;
            position: relative;
        }

        .chat-header {
            background: #075e54;
            color: white;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 70%;
            margin-bottom: 10px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            align-self: flex-end;
        }

        .message-content {
            padding: 8px 12px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.own .message-content {
            background: #dcf8c6;
            border-bottom-right-radius: 4px;
        }

        .message.other .message-content {
            background: white;
            border-bottom-left-radius: 4px;
        }

        .message-text {
            font-size: 14px;
        }

        .message-time {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
            text-align: right;
        }

        .input-area {
            padding: 10px 15px;
            background: #f0f0f0;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            border-top: 1px solid #ddd;
            position: relative;
        }

        .message-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            resize: none;
            font-family: inherit;
            max-height: 100px;
            background: white;
            line-height: 1.4;
        }

        .send-btn {
            background: #075e54;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            z-index: 9999;
            animation: fadeOut 2s forwards;
            font-size: 14px;
            white-space: nowrap;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
            }

            70% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                bottom: 0;
                z-index: 1000;
                transition: left 0.3s ease;
                width: 280px;
                background: white;
            }

            .sidebar.open {
                left: 0;
                box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
            }

            .menu-toggle {
                display: flex;
                position: fixed;
                top: 12px;
                left: 12px;
                z-index: 1001;
                background: #075e54;
                color: white;
                border: none;
                width: 44px;
                height: 44px;
                border-radius: 50%;
                cursor: pointer;
                font-size: 20px;
                align-items: center;
                justify-content: center;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            }

            .chat-header {
                padding-left: 65px;
            }

            .message {
                max-width: 85%;
            }

            .input-area {
                padding: 8px 12px;
            }

            .message-input {
                font-size: 16px;
                padding: 10px 14px;
            }

            .send-btn {
                width: 44px;
                height: 44px;
            }

            .toast {
                bottom: 70px;
                white-space: normal;
                max-width: 80%;
                text-align: center;
            }
        }

        .menu-toggle {
            display: none;
        }

        .empty-state {
            text-align: center;
            color: #999;
            margin-top: 50px;
        }

        .typing-indicator {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            padding: 5px 0 0 0;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="app">
        <div id="loginScreen" class="screen active">
            <div class="login-container">
                <div class="login-card">
                    <h2>📱 LinarChat</h2>
                    <p>Введите ваше имя</p>
                    <input type="text" id="username" placeholder="Ваше имя" maxlength="30" autocomplete="off">
                    <button class="btn-primary" id="loginBtn">Войти</button>
                </div>
            </div>
        </div>

        <div id="chatScreen" class="screen">
            <div class="chat-container">
                <div class="sidebar" id="sidebar">
                    <div class="sidebar-header">
                        <div class="user-info">
                            <div class="user-name-display" id="currentUserName"></div>
                            <div class="user-id" id="currentUserId"></div>
                        </div>
                        <button class="copy-btn" id="copyIdBtn">📋 Копировать ID</button>
                        <button class="notify-btn" id="enableNotificationsBtn">🔔 Включить уведомления</button>
                        <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
                    </div>
                    <div class="users-list" id="usersList">
                        <div class="empty-state">Загрузка...</div>
                    </div>
                </div>

                <div class="chat-area">
                    <div class="chat-header">
                        <span id="chatUserName">Выберите собеседника</span>
                        <div id="typingStatus" class="typing-indicator" style="display: none;"></div>
                    </div>
                    <div class="messages" id="messages">
                        <div class="empty-state">💬 Нажмите на контакт чтобы начать чат</div>
                    </div>
                    <div class="input-area">
                        <textarea class="message-input" id="messageInput" placeholder="Введите сообщение..." rows="1"
                            disabled></textarea>
                        <button class="send-btn" id="sendBtn" disabled>✈️</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <button class="menu-toggle" id="menuToggle">☰</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDjmOjOajsNN0OuCDyqExFZ3Fjznv1UyAE",
            authDomain: "linarchat-8fc1b.firebaseapp.com",
            projectId: "linarchat-8fc1b",
            storageBucket: "linarchat-8fc1b.firebasestorage.app",
            messagingSenderId: "120171949297",
            appId: "1:120171949297:web:ee7a964c4f0c7442960d50"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser = null;
        let currentChat = null;
        let unsubscribeMessages = null;
        let notificationsEnabled = false;
        let typingTimeout = null;
        let isTyping = false;
        let heartbeatInterval = null;
        let visibilityInterval = null;

        // DOM элементы
        const loginScreen = document.getElementById('loginScreen');
        const chatScreen = document.getElementById('chatScreen');
        const usernameInput = document.getElementById('username');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const copyIdBtn = document.getElementById('copyIdBtn');
        const usersList = document.getElementById('usersList');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const currentUserNameSpan = document.getElementById('currentUserName');
        const currentUserIdSpan = document.getElementById('currentUserId');
        const chatUserNameSpan = document.getElementById('chatUserName');
        const typingStatus = document.getElementById('typingStatus');
        const menuToggle = document.getElementById('menuToggle');
        const enableNotificationsBtn = document.getElementById('enableNotificationsBtn');

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // ============ УПРАВЛЕНИЕ СТАТУСОМ ============
        async function updateUserStatus(isOnline) {
            if (!currentUser) return;

            try {
                await db.collection('users').doc(currentUser.uid).update({
                    status: isOnline ? 'online' : 'offline',
                    lastSeen: new Date().toISOString(),
                    ...(isOnline ? {} : { disconnectedAt: new Date().toISOString() })
                });
                console.log(`Status updated: ${isOnline ? 'online' : 'offline'}`);
            } catch (error) {
                console.error('Status update error:', error);
            }
        }

        // Heartbeat - обновление статуса каждые 15 секунд
        function startHeartbeat() {
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            heartbeatInterval = setInterval(async () => {
                if (currentUser && document.visibilityState === 'visible') {
                    await updateUserStatus(true);
                }
            }, 15000);
        }

        function stopHeartbeat() {
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }
        }

        // Отслеживание видимости страницы
        function initVisibilityTracking() {
            document.addEventListener('visibilitychange', async () => {
                if (!currentUser) return;

                const isVisible = document.visibilityState === 'visible';
                await updateUserStatus(isVisible);

                if (isVisible) {
                    console.log('Page visible - online');
                    startHeartbeat();
                } else {
                    console.log('Page hidden - offline');
                    stopHeartbeat();
                }
            });
        }

        // Сохранение сессии в localStorage
        function saveSession(userData) {
            const sessionData = {
                uid: userData.uid,
                username: userData.username,
                savedAt: new Date().toISOString()
            };
            localStorage.setItem('linarchat_session', JSON.stringify(sessionData));
        }

        function getSavedSession() {
            const saved = localStorage.getItem('linarchat_session');
            if (saved) {
                try {
                    const session = JSON.parse(saved);
                    // Проверяем, не старше ли 7 дней
                    const savedDate = new Date(session.savedAt);
                    const now = new Date();
                    const daysDiff = (now - savedDate) / (1000 * 60 * 60 * 24);
                    if (daysDiff < 7) {
                        return session;
                    }
                } catch (e) { }
            }
            return null;
        }

        function clearSession() {
            localStorage.removeItem('linarchat_session');
        }

        // ============ УВЕДОМЛЕНИЯ ============
        if (enableNotificationsBtn) {
            enableNotificationsBtn.onclick = async () => {
                if (!('Notification' in window)) {
                    showToast('❌ Ваш браузер не поддерживает уведомления');
                    return;
                }

                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    notificationsEnabled = true;
                    showToast('✅ Уведомления включены');
                    enableNotificationsBtn.textContent = '🔔 Уведомления включены';
                    enableNotificationsBtn.style.background = 'rgba(37, 211, 102, 0.8)';

                    new Notification('🔔 LinarChat', {
                        body: 'Уведомления работают! Вы будете получать оповещения о новых сообщениях',
                        icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23075e54"/%3E%3Ctext x="50" y="70" font-size="60" text-anchor="middle" fill="white" font-weight="bold"%3EL%3C/text%3E%3C/svg%3E'
                    });
                } else {
                    showToast('❌ Уведомления отключены в настройках браузера');
                }
            };
        }

        function showNotification(senderName, message, senderId) {
            if (!notificationsEnabled) return;
            if (document.hasFocus() && currentChat === senderId) return;

            try {
                const notification = new Notification(`📩 ${senderName}`, {
                    body: message.length > 60 ? message.substring(0, 60) + '...' : message,
                    icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23075e54"/%3E%3Ctext x="50" y="70" font-size="60" text-anchor="middle" fill="white" font-weight="bold"%3EL%3C/text%3E%3C/svg%3E',
                    tag: senderId,
                    vibrate: [200, 100, 200]
                });

                notification.onclick = () => {
                    window.focus();
                    window.selectUser(senderId);
                    notification.close();
                };

                setTimeout(() => notification.close(), 5000);
            } catch (e) {
                console.log('Notification error:', e);
            }
        }

        function listenForNewMessages() {
            if (!currentUser) return;

            db.collectionGroup('messages')
                .where('receiverId', '==', currentUser.uid)
                .where('read', '==', false)
                .onSnapshot(async (snapshot) => {
                    for (const change of snapshot.docChanges()) {
                        if (change.type === 'added') {
                            const message = change.doc.data();
                            if (message.senderId !== currentUser.uid) {
                                const senderDoc = await db.collection('users').doc(message.senderId).get();
                                const senderData = senderDoc.data();
                                if (senderData && senderData.username) {
                                    showNotification(senderData.username, message.text, message.senderId);
                                }
                            }
                        }
                    }
                });
        }

        // ============ АВТОРИЗАЦИЯ ============
        async function restoreSession() {
            const savedSession = getSavedSession();
            if (!savedSession) return false;

            try {
                // Проверяем, существует ли пользователь в Firebase
                const userDoc = await db.collection('users').doc(savedSession.uid).get();
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    currentUser = {
                        uid: savedSession.uid,
                        username: userData.username
                    };

                    currentUserNameSpan.textContent = userData.username;
                    currentUserIdSpan.textContent = `ID: ${currentUser.uid.slice(0, 8)}...`;

                    await updateUserStatus(true);
                    startHeartbeat();

                    loginScreen.classList.remove('active');
                    chatScreen.classList.add('active');

                    loadUsers();
                    listenForNewMessages();
                    showToast(`✅ С возвращением, ${userData.username}!`);
                    return true;
                }
            } catch (error) {
                console.error('Session restore error:', error);
            }
            return false;
        }

        loginBtn.onclick = async () => {
            const username = usernameInput.value.trim();
            if (!username) {
                showToast('❌ Введите ваше имя');
                return;
            }

            try {
                showToast('🔄 Подключение...');
                const userCredential = await auth.signInAnonymously();
                currentUser = {
                    uid: userCredential.user.uid,
                    username: username
                };

                // Удаляем старые записи с таким же именем
                const existingUsers = await db.collection('users').where('username', '==', username).get();
                for (const doc of existingUsers.docs) {
                    if (doc.id !== currentUser.uid) {
                        await db.collection('users').doc(doc.id).delete();
                    }
                }

                await db.collection('users').doc(currentUser.uid).set({
                    username: username,
                    status: 'online',
                    lastSeen: new Date().toISOString(),
                    createdAt: new Date().toISOString()
                });

                // Сохраняем сессию
                saveSession(currentUser);

                currentUserNameSpan.textContent = username;
                currentUserIdSpan.textContent = `ID: ${currentUser.uid.slice(0, 8)}...`;

                loginScreen.classList.remove('active');
                chatScreen.classList.add('active');

                startHeartbeat();
                loadUsers();
                listenForNewMessages();
                showToast(`✅ Добро пожаловать, ${username}!`);

            } catch (error) {
                console.error(error);
                showToast('❌ Ошибка: ' + error.message);
            }
        };

        logoutBtn.onclick = async () => {
            if (currentUser) {
                await updateUserStatus(false);
                stopHeartbeat();
                clearSession();
            }
            await auth.signOut();
            currentUser = null;
            currentChat = null;
            if (unsubscribeMessages) unsubscribeMessages();
            loginScreen.classList.add('active');
            chatScreen.classList.remove('active');
            usernameInput.value = '';
            showToast('👋 Вы вышли из чата');
        };

        copyIdBtn.onclick = () => {
            if (currentUser) {
                navigator.clipboard.writeText(currentUser.uid);
                showToast('✅ ID скопирован!');
            }
        };

        // ============ ЗАГРУЗКА ПОЛЬЗОВАТЕЛЕЙ (только онлайн) ============
        function loadUsers() {
            // Показываем только пользователей со статусом 'online'
            db.collection('users')
                .where('status', '==', 'online')
                .onSnapshot((snapshot) => {
                    const usersMap = new Map();
                    snapshot.forEach(doc => {
                        if (doc.id !== currentUser?.uid) {
                            const data = doc.data();
                            // Проверяем, что последнее обновление было не старше 1 минуты
                            const lastSeen = new Date(data.lastSeen);
                            const now = new Date();
                            const secondsDiff = (now - lastSeen) / 1000;

                            // Если прошло больше 45 секунд без обновления - считаем оффлайн
                            if (secondsDiff < 45) {
                                if (!usersMap.has(data.username) ||
                                    new Date(usersMap.get(data.username).lastSeen) < lastSeen) {
                                    usersMap.set(data.username, { id: doc.id, ...data });
                                }
                            }
                        }
                    });

                    const users = Array.from(usersMap.values());

                    if (users.length === 0) {
                        usersList.innerHTML = '<div class="empty-state">👥 Нет пользователей онлайн</div>';
                    } else {
                        usersList.innerHTML = users.map(user => `
                            <div class="user-item" onclick="selectUser('${user.id}')" data-user-id="${user.id}">
                                <div>
                                    <div class="user-name">${escapeHtml(user.username)}</div>
                                    <div class="user-status online">🟢 Онлайн</div>
                                </div>
                                ${user.unread ? `<div class="unread-badge">${user.unread}</div>` : ''}
                            </div>
                        `).join('');
                    }
                });
        }

        // ============ ВЫБОР ЧАТА ============
        window.selectUser = async function (userId) {
            if (unsubscribeMessages) unsubscribeMessages();

            currentChat = userId;

            const userDoc = await db.collection('users').doc(userId).get();
            const userData = userDoc.data();
            chatUserNameSpan.textContent = userData.username;

            messageInput.disabled = false;
            sendBtn.disabled = false;
            messageInput.focus();

            const chatId = [currentUser.uid, userId].sort().join('_');
            unsubscribeMessages = db.collection('chats')
                .doc(chatId)
                .collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot((snapshot) => {
                    const messages = [];
                    snapshot.forEach(doc => {
                        messages.push({ id: doc.id, ...doc.data() });
                    });
                    renderMessages(messages);

                    messages.forEach(msg => {
                        if (msg.receiverId === currentUser.uid && !msg.read) {
                            db.collection('chats').doc(chatId).collection('messages').doc(msg.id).update({ read: true });
                        }
                    });
                });

            listenForTyping(userId);

            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        };

        function listenForTyping(userId) {
            const chatId = [currentUser.uid, userId].sort().join('_');
            db.collection('chats').doc(chatId).onSnapshot((doc) => {
                if (doc.exists && doc.data().typing) {
                    const typingData = doc.data().typing;
                    if (typingData.userId === userId && typingData.isTyping) {
                        typingStatus.style.display = 'block';
                        typingStatus.textContent = `${typingData.username} печатает...`;
                        setTimeout(() => {
                            typingStatus.style.display = 'none';
                        }, 2000);
                    } else {
                        typingStatus.style.display = 'none';
                    }
                } else {
                    typingStatus.style.display = 'none';
                }
            });
        }

        messageInput.oninput = function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';

            if (currentChat && !isTyping) {
                isTyping = true;
                const chatId = [currentUser.uid, currentChat].sort().join('_');
                db.collection('chats').doc(chatId).set({
                    typing: {
                        userId: currentUser.uid,
                        username: currentUser.username,
                        isTyping: true,
                        timestamp: new Date().toISOString()
                    }
                }, { merge: true });

                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    db.collection('chats').doc(chatId).set({
                        typing: {
                            userId: currentUser.uid,
                            isTyping: false
                        }
                    }, { merge: true });
                    isTyping = false;
                }, 1000);
            }
        };

        function renderMessages(messages) {
            if (messages.length === 0) {
                messagesDiv.innerHTML = '<div class="empty-state">💬 Напишите первое сообщение</div>';
                return;
            }

            messagesDiv.innerHTML = messages.map(msg => {
                const isOwn = msg.senderId === currentUser.uid;
                const time = msg.timestamp?.toDate ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
                return `
                    <div class="message ${isOwn ? 'own' : 'other'}">
                        <div class="message-content">
                            <div class="message-text">${escapeHtml(msg.text)}</div>
                            <div class="message-time">${time}</div>
                        </div>
                    </div>
                `;
            }).join('');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        sendBtn.onclick = async () => {
            const text = messageInput.value.trim();
            if (!text || !currentChat) return;

            const chatId = [currentUser.uid, currentChat].sort().join('_');
            await db.collection('chats').doc(chatId).collection('messages').add({
                text: text,
                senderId: currentUser.uid,
                receiverId: currentChat,
                timestamp: new Date(),
                read: false
            });

            messageInput.value = '';
            messageInput.style.height = 'auto';

            if (isTyping) {
                db.collection('chats').doc(chatId).set({
                    typing: { userId: currentUser.uid, isTyping: false }
                }, { merge: true });
                isTyping = false;
            }
        };

        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        };

        menuToggle.onclick = () => {
            document.getElementById('sidebar').classList.toggle('open');
        };

        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
                if (!sidebar.contains(e.target) && e.target !== menuToggle) {
                    sidebar.classList.remove('open');
                }
            }
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // При закрытии вкладки
        window.addEventListener('beforeunload', async () => {
            if (currentUser) {
                await updateUserStatus(false);
                stopHeartbeat();
            }
        });

        // Инициализация
        initVisibilityTracking();

        // Пытаемся восстановить сессию
        restoreSession().then(restored => {
            if (!restored) {
                console.log('No saved session, showing login');
            }
        });

        if (Notification.permission === 'granted') {
            notificationsEnabled = true;
            if (enableNotificationsBtn) {
                enableNotificationsBtn.textContent = '🔔 Уведомления включены';
                enableNotificationsBtn.style.background = 'rgba(37, 211, 102, 0.8)';
            }
        }
    </script>
</body>

</html>
