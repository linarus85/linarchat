<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>LinarChat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .app {
            width: 100%;
            height: 100%;
            background: #f0f2f5;
            position: relative;
            overflow: hidden;
        }

        /* Экран входа */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .screen.active {
            display: flex;
        }

        .login-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .login-card h2 {
            margin-bottom: 10px;
            color: #333;
            font-size: 28px;
        }

        .login-card p {
            color: #666;
            margin-bottom: 20px;
        }

        .login-card input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            margin: 20px 0;
            outline: none;
        }

        .login-card input:focus {
            border-color: #667eea;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Чат контейнер - занимает весь экран */
        .chat-container {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* Боковая панель */
        .sidebar {
            width: 280px;
            background: white;
            display: flex;
            flex-direction: column;
            position: fixed;
            left: -280px;
            top: 0;
            bottom: 0;
            z-index: 1000;
            transition: left 0.3s ease;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar.open {
            left: 0;
        }

        @media (min-width: 769px) {
            .sidebar {
                position: relative;
                left: 0;
                width: 300px;
                box-shadow: none;
            }
        }

        .sidebar-header {
            padding: 20px;
            background: #075e54;
            color: white;
            flex-shrink: 0;
        }

        .user-info {
            margin-bottom: 10px;
        }

        .user-name-display {
            font-weight: bold;
            font-size: 18px;
        }

        .user-id {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 5px;
            word-break: break-all;
        }

        .logout-btn,
        .copy-btn,
        .notify-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
            font-size: 14px;
        }

        .notify-btn {
            background: rgba(37, 211, 102, 0.8);
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .user-item {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-item:active {
            background: #e8f0fe;
        }

        .user-name {
            font-weight: 600;
            font-size: 16px;
        }

        .user-status {
            font-size: 12px;
            margin-top: 4px;
            color: #25D366;
        }

        .unread-badge {
            background: #ff4444;
            color: white;
            border-radius: 50%;
            min-width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            padding: 0 6px;
        }

        /* Область чата - занимает всю оставшуюся ширину */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #e5ddd5;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .chat-header {
            background: #075e54;
            color: white;
            padding: 12px 50px 12px 55px;
            font-size: 17px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            min-height: 56px;
        }

        @media (min-width: 769px) {
            .chat-header {
                padding: 15px 20px;
            }
        }

        .menu-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            left: 10px;
            top: 8px;
            z-index: 10;
        }

        @media (min-width: 769px) {
            .menu-btn {
                display: none;
            }
        }

        .chat-header span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 85%;
            margin-bottom: 8px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            align-self: flex-end;
        }

        .message-content {
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.own .message-content {
            background: #dcf8c6;
            border-bottom-right-radius: 4px;
        }

        .message.other .message-content {
            background: white;
            border-bottom-left-radius: 4px;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
        }

        .message-time {
            font-size: 10px;
            color: #999;
            margin-top: 5px;
            text-align: right;
        }

        /* Панель ввода - фиксирована внизу */
        .input-area {
            padding: 10px 12px;
            background: #fff;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            border-top: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
            resize: none;
            font-family: inherit;
            max-height: 100px;
            background: #f8f8f8;
            line-height: 1.4;
        }

        .message-input:focus {
            background: white;
            border-color: #075e54;
        }

        .send-btn {
            background: #075e54;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            z-index: 9999;
            animation: fadeOut 2s forwards;
            font-size: 13px;
            white-space: nowrap;
            pointer-events: none;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: translateX(-50%) scale(1);
            }

            70% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                transform: translateX(-50%) scale(0.95);
            }
        }

        .empty-state {
            text-align: center;
            color: #999;
            margin-top: 40px;
        }

        .typing-indicator {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            margin-left: 10px;
            font-style: italic;
        }

        /* Оверлей для закрытия меню */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .sidebar-overlay.active {
            display: block;
        }

        @media (min-width: 769px) {
            .sidebar-overlay {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- Экран входа -->
        <div id="loginScreen" class="screen active">
            <div class="login-container">
                <div class="login-card">
                    <h2>📱 LinarChat</h2>
                    <p>Введите ваше имя</p>
                    <input type="text" id="username" placeholder="Ваше имя" maxlength="30" autocomplete="off">
                    <button class="btn-primary" id="loginBtn">Войти</button>
                </div>
            </div>
        </div>

        <!-- Основной чат -->
        <div id="chatScreen" class="screen">
            <div class="chat-container">
                <div id="sidebarOverlay" class="sidebar-overlay"></div>

                <div class="sidebar" id="sidebar">
                    <div class="sidebar-header">
                        <div class="user-info">
                            <div class="user-name-display" id="currentUserName"></div>
                            <div class="user-id" id="currentUserId"></div>
                        </div>
                        <button class="copy-btn" id="copyIdBtn">📋 Копировать ID</button>
                        <button class="notify-btn" id="enableNotificationsBtn">🔔 Включить уведомления</button>
                        <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
                    </div>
                    <div class="users-list" id="usersList">
                        <div class="empty-state">👥 Загрузка...</div>
                    </div>
                </div>

                <div class="chat-area">
                    <div class="chat-header">
                        <button class="menu-btn" id="menuToggle">☰</button>
                        <span id="chatUserName">Выберите собеседника</span>
                        <div id="typingStatus" class="typing-indicator" style="display: none;"></div>
                    </div>
                    <div class="messages" id="messages">
                        <div class="empty-state">💬 Нажмите ☰ и выберите собеседника</div>
                    </div>
                    <div class="input-area">
                        <textarea class="message-input" id="messageInput" placeholder="Введите сообщение..." rows="1"
                            disabled></textarea>
                        <button class="send-btn" id="sendBtn" disabled>✈️</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDjmOjOajsNN0OuCDyqExFZ3Fjznv1UyAE",
            authDomain: "linarchat-8fc1b.firebaseapp.com",
            projectId: "linarchat-8fc1b",
            storageBucket: "linarchat-8fc1b.firebasestorage.app",
            messagingSenderId: "120171949297",
            appId: "1:120171949297:web:ee7a964c4f0c7442960d50"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser = null;
        let currentChat = null;
        let unsubscribeMessages = null;
        let notificationsEnabled = false;

        const loginScreen = document.getElementById('loginScreen');
        const chatScreen = document.getElementById('chatScreen');
        const usernameInput = document.getElementById('username');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const copyIdBtn = document.getElementById('copyIdBtn');
        const usersList = document.getElementById('usersList');
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const currentUserNameSpan = document.getElementById('currentUserName');
        const currentUserIdSpan = document.getElementById('currentUserId');
        const chatUserNameSpan = document.getElementById('chatUserName');
        const typingStatus = document.getElementById('typingStatus');
        const menuToggle = document.getElementById('menuToggle');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const enableNotificationsBtn = document.getElementById('enableNotificationsBtn');

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            sidebarOverlay.classList.add('active');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            sidebarOverlay.classList.remove('active');
        }

        menuToggle.onclick = openSidebar;
        sidebarOverlay.onclick = closeSidebar;

        window.selectUser = async function (userId) {
            closeSidebar();

            if (unsubscribeMessages) unsubscribeMessages();

            currentChat = userId;

            const userDoc = await db.collection('users').doc(userId).get();
            const userData = userDoc.data();
            chatUserNameSpan.textContent = userData.username;

            messageInput.disabled = false;
            sendBtn.disabled = false;
            messageInput.focus();

            const chatId = [currentUser.uid, userId].sort().join('_');
            unsubscribeMessages = db.collection('chats')
                .doc(chatId)
                .collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot((snapshot) => {
                    const messages = [];
                    snapshot.forEach(doc => {
                        messages.push({ id: doc.id, ...doc.data() });
                    });
                    renderMessages(messages);

                    messages.forEach(msg => {
                        if (msg.receiverId === currentUser.uid && !msg.read) {
                            db.collection('chats').doc(chatId).collection('messages').doc(msg.id).update({ read: true });
                        }
                    });
                });
        };

        if (enableNotificationsBtn) {
            enableNotificationsBtn.onclick = async () => {
                if (!('Notification' in window)) {
                    showToast('❌ Ваш браузер не поддерживает уведомления');
                    return;
                }

                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    notificationsEnabled = true;
                    showToast('✅ Уведомления включены');
                    enableNotificationsBtn.textContent = '🔔 Уведомления включены';
                    enableNotificationsBtn.style.background = 'rgba(37, 211, 102, 0.8)';
                } else {
                    showToast('❌ Уведомления отключены');
                }
            };
        }

        function showNotification(senderName, message, senderId) {
            if (!notificationsEnabled) return;
            if (document.hasFocus() && currentChat === senderId) return;

            const notification = new Notification(`📩 ${senderName}`, {
                body: message.length > 60 ? message.substring(0, 60) + '...' : message,
                icon: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23075e54"/%3E%3Ctext x="50" y="70" font-size="60" text-anchor="middle" fill="white"%3EL%3C/text%3E%3C/svg%3E',
                tag: senderId
            });

            notification.onclick = () => {
                window.focus();
                window.selectUser(senderId);
                notification.close();
            };

            setTimeout(() => notification.close(), 5000);
        }

        function listenForNewMessages() {
            if (!currentUser) return;

            db.collectionGroup('messages').onSnapshot(async (snapshot) => {
                for (const change of snapshot.docChanges()) {
                    if (change.type === 'added') {
                        const message = change.doc.data();
                        if (message.receiverId === currentUser.uid && !message.read && message.senderId !== currentUser.uid) {
                            const senderDoc = await db.collection('users').doc(message.senderId).get();
                            const senderData = senderDoc.data();
                            if (senderData) {
                                showNotification(senderData.username, message.text, message.senderId);
                            }
                        }
                    }
                }
            });
        }

        function loadUsers() {
            db.collection('users').onSnapshot((snapshot) => {
                const users = [];
                const now = new Date();

                snapshot.forEach(doc => {
                    if (doc.id !== currentUser?.uid) {
                        const data = doc.data();
                        const lastSeen = new Date(data.lastSeen);
                        const secondsDiff = (now - lastSeen) / 1000;

                        if (secondsDiff < 60) {
                            users.push({ id: doc.id, ...data });
                        }
                    }
                });

                users.sort((a, b) => a.username.localeCompare(b.username));

                if (users.length === 0) {
                    usersList.innerHTML = '<div class="empty-state">👥 Нет пользователей онлайн</div>';
                } else {
                    usersList.innerHTML = users.map(user => `
                        <div class="user-item" onclick="selectUser('${user.id}')">
                            <div>
                                <div class="user-name">${escapeHtml(user.username)}</div>
                                <div class="user-status">🟢 Онлайн</div>
                            </div>
                        </div>
                    `).join('');
                }
            });
        }

        function renderMessages(messages) {
            if (messages.length === 0) {
                messagesDiv.innerHTML = '<div class="empty-state">💬 Напишите первое сообщение</div>';
                return;
            }

            messagesDiv.innerHTML = messages.map(msg => {
                const isOwn = msg.senderId === currentUser.uid;
                const time = msg.timestamp?.toDate ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
                return `
                    <div class="message ${isOwn ? 'own' : 'other'}">
                        <div class="message-content">
                            <div class="message-text">${escapeHtml(msg.text)}</div>
                            <div class="message-time">${time}</div>
                        </div>
                    </div>
                `;
            }).join('');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        sendBtn.onclick = async () => {
            const text = messageInput.value.trim();
            if (!text || !currentChat) return;

            const chatId = [currentUser.uid, currentChat].sort().join('_');
            await db.collection('chats').doc(chatId).collection('messages').add({
                text: text,
                senderId: currentUser.uid,
                receiverId: currentChat,
                timestamp: new Date(),
                read: false
            });

            messageInput.value = '';
            messageInput.style.height = 'auto';
        };

        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        };

        messageInput.oninput = function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        };

        loginBtn.onclick = async () => {
            const username = usernameInput.value.trim();
            if (!username) {
                showToast('❌ Введите ваше имя');
                return;
            }

            try {
                showToast('🔄 Подключение...');
                const userCredential = await auth.signInAnonymously();
                currentUser = {
                    uid: userCredential.user.uid,
                    username: username
                };

                await db.collection('users').doc(currentUser.uid).set({
                    username: username,
                    status: 'online',
                    lastSeen: new Date().toISOString(),
                    createdAt: new Date().toISOString()
                });

                currentUserNameSpan.textContent = username;
                currentUserIdSpan.textContent = `ID: ${currentUser.uid.slice(0, 8)}...`;

                loginScreen.classList.remove('active');
                chatScreen.classList.add('active');

                loadUsers();
                listenForNewMessages();
                showToast(`✅ Добро пожаловать, ${username}!`);

            } catch (error) {
                showToast('❌ Ошибка: ' + error.message);
            }
        };

        logoutBtn.onclick = async () => {
            if (currentUser) {
                await db.collection('users').doc(currentUser.uid).update({ status: 'offline' });
            }
            await auth.signOut();
            currentUser = null;
            currentChat = null;
            if (unsubscribeMessages) unsubscribeMessages();
            loginScreen.classList.add('active');
            chatScreen.classList.remove('active');
            usernameInput.value = '';
        };

        copyIdBtn.onclick = () => {
            if (currentUser) {
                navigator.clipboard.writeText(currentUser.uid);
                showToast('✅ ID скопирован!');
            }
        };

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        setInterval(async () => {
            if (currentUser) {
                await db.collection('users').doc(currentUser.uid).update({
                    lastSeen: new Date().toISOString(),
                    status: 'online'
                });
            }
        }, 30000);

        window.addEventListener('beforeunload', async () => {
            if (currentUser) {
                await db.collection('users').doc(currentUser.uid).update({ status: 'offline' });
            }
        });

        if (Notification.permission === 'granted') {
            notificationsEnabled = true;
            if (enableNotificationsBtn) {
                enableNotificationsBtn.textContent = '🔔 Уведомления включены';
                enableNotificationsBtn.style.background = 'rgba(37, 211, 102, 0.8)';
            }
        }
    </script>
</body>

</html>
